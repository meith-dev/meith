name: Commit Messages

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  commitlint:
    name: Validate Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        run: printf '%s\n' "$PR_TITLE" | pnpm commitlint
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: pnpm commitlint --from "$BASE_SHA" --to "$HEAD_SHA"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Validate pushed commits
        if: github.event_name == 'push'
        run: |
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "Skipping commitlint because this push created the branch."
            exit 0
          fi

          pnpm commitlint --from "$BEFORE_SHA" --to "$HEAD_SHA"
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
