name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    env:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    outputs:
      release_created: ${{ steps.detect-release.outputs.release_created }}
      tag: ${{ steps.detect-release.outputs.tag }}
      version: ${{ steps.detect-release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Release Please token
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "::error::Set the RELEASE_PLEASE_TOKEN repository secret to a fine-grained PAT or GitHub App token with contents, pull requests, and issues write access."
            exit 1
          fi

      - name: Create GitHub Release from merged Release PR
        run: pnpm release:github --token="$RELEASE_PLEASE_TOKEN"

      - name: Create or update Release PR
        run: pnpm release:pr --token="$RELEASE_PLEASE_TOKEN"

      - name: Detect release tag on this commit
        id: detect-release
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"

          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}" || true
          tag_sha="$(git rev-list -n 1 "$tag" 2>/dev/null || true)"

          {
            echo "version=${version}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"

          if [ "$tag_sha" = "$GITHUB_SHA" ]; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    name: Build macOS artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build macOS arm64 package
        run: pnpm dist:mac -- --arm64

      - name: Write checksums
        run: |
          shasum -a 256 \
            "packages/desktop/release/meith-${VERSION}-mac-arm64.dmg" \
            "packages/desktop/release/meith-${VERSION}-mac-arm64.zip" \
            > "packages/desktop/release/meith-${VERSION}-checksums.txt"
        env:
          VERSION: ${{ needs.release-please.outputs.version }}

      - name: Upload release artifacts
        run: |
          gh release upload "$TAG" \
            "packages/desktop/release/meith-${VERSION}-mac-arm64.dmg" \
            "packages/desktop/release/meith-${VERSION}-mac-arm64.zip" \
            "packages/desktop/release/meith-${VERSION}-mac-arm64.dmg.blockmap" \
            "packages/desktop/release/meith-${VERSION}-mac-arm64.zip.blockmap" \
            "packages/desktop/release/meith-${VERSION}-checksums.txt" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag }}
          VERSION: ${{ needs.release-please.outputs.version }}
