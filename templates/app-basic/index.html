<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>meith app-basic</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0b0f;
        color: #ededf2;
      }
      main {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.75rem;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        line-height: 1.5;
      }
      code {
        background: #1c1c22;
        padding: 0.15rem 0.4rem;
        border-radius: 0.35rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Your meith app is running</h1>
      <p>
        Edit <code>index.html</code> to get started. This template is served by
        <code>server.mjs</code> with zero dependencies.
      </p>
    </main>
  </body>
</html>
